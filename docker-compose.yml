services:
  # This runs your FastAPI backend
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000

  # This runs your Streamlit frontend
  frontend:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/code
    command: streamlit run streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api